spring:
  application:
    name: ecommerce-api
management:
  health:
    status:
      http-mapping:
        UP: 207
  endpoints:
    web:
      exposure:
        include: "refresh,health,info,metrics"
  endpoint:
    health:
      probes:
        enabled: true
      group:
        custom:
          include: diskSpace,ping
          show-components: always
      show-details: always
  tracing:
    sampling:
      probability: 1.0
